{% load humanize %}
<div class="period-bar bg-light rounded-3 p-2 px-3 mb-3 d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center gap-3">
        <span class="fw-semibold text-muted small">
            <i class="bi bi-calendar3 me-1"></i>Fiscal Period
        </span>
        <span class="pill pill-navy">{{ period_fiscal_year|default:"FY2026" }}</span>
        <span class="text-muted small">{{ period_month|default:"" }}{% if period_month %} &middot; {% endif %}{{ period_status|default:"Under Review" }}</span>
    </div>
    <div class="d-flex align-items-center gap-2">
        <span class="pill fleet-health-{{ fleet_health|default:'gray' }}">
            <i class="bi bi-heart-pulse me-1"></i>Fleet: {{ fleet_health|default:"—" }}
        </span>
    </div>
</div>
