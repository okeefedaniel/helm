{% extends "tasks/_base.html" %}

{% block page_title %}Inbox{% endblock %}

{% block tasks_body %}
<div class="card border-0 shadow-sm">
    <div class="card-header bg-white border-bottom py-2"><h6 class="mb-0 small"><i class="bi bi-inbox me-1"></i>Unassigned</h6></div>
    <div class="list-group list-group-flush">
        {% for task in tasks %}
        {% include "tasks/partials/task_row.html" with task=task %}
        {% empty %}
        <div class="px-3 py-4 text-muted small fst-italic text-center">Inbox zero. Nothing to triage.</div>
        {% endfor %}
    </div>
</div>
{% endblock %}
