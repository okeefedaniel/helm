{% load helm_tags %}
{# Product launcher — personalized app grid based on user's ProductAccess #}
<div class="row g-3">
    {% for product in user_products %}
    <div class="col-6 col-md-4 col-lg-3">
        <a href="{{ product.url }}" class="card border-0 shadow-sm text-decoration-none product-launcher-card h-100" target="_blank" rel="noopener">
            <div class="card-body text-center py-4">
                <div class="mb-2">
                    <i class="{{ product.icon }} fs-1 text-primary"></i>
                </div>
                <h6 class="fw-bold mb-1">{{ product.label }}</h6>
                <small class="text-muted">{{ product.tagline }}</small>
            </div>
        </a>
    </div>
    {% empty %}
    <div class="col-12 text-center text-muted py-4">
        <i class="bi bi-lock fs-3 d-block mb-2"></i>
        <p>No products assigned yet. Contact your administrator.</p>
    </div>
    {% endfor %}
</div>
