{% extends "tasks/_base.html" %}

{% block page_title %}New Project{% endblock %}

{% block tasks_body %}
<div class="card border-0 shadow-sm">
    <div class="card-header bg-white border-bottom py-2"><h6 class="mb-0 small">New Project</h6></div>
    <div class="card-body">
        <form method="post">{% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label small">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<div class="text-danger small">{{ field.errors|join:", " }}</div>{% endif %}
            </div>
            {% endfor %}
            <button class="btn btn-primary btn-sm" type="submit">Create</button>
            <a class="btn btn-sm btn-link" href="{% url 'tasks:project_list' %}">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
