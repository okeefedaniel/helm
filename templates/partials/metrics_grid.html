{% load helm_tags %}
<div class="row g-2">
    {% for key, card in metrics_by_product.items %}
    <div class="col-md-6 col-lg-4 col-xl-3">
        {% include "partials/product_card.html" with card=card product_key=key %}
    </div>
    {% empty %}
    <div class="col-12">
        <div class="card border-0 shadow-sm">
            <div class="card-body text-center text-muted py-4">
                <i class="bi bi-database-slash fs-3 d-block mb-2"></i>
                <p class="mb-1 small">No product feeds available yet.</p>
                <small>Run <code>python manage.py seed_helm</code> to load demo data.</small>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
