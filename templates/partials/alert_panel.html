{% load helm_tags %}
<div class="card border-0 shadow-sm">
    <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center">
        <h6 class="mb-0">
            <i class="bi bi-exclamation-diamond text-danger me-2"></i>Alerts
            {% if alerts_count %}
            <span class="badge bg-danger ms-1">{{ alerts_count }}</span>
            {% endif %}
        </h6>
    </div>
    {% if alerts %}
    <div class="list-group list-group-flush" style="max-height: 400px; overflow-y: auto;">
        {% for alert in alerts %}
        <a href="{{ alert.deep_link }}" class="list-group-item list-group-item-action py-2{% if alert.severity == 'critical' %} list-group-item-danger{% elif alert.severity == 'warning' %} list-group-item-warning{% endif %}" target="_blank" rel="noopener">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <div class="d-flex align-items-center gap-2 mb-1">
                        <i class="{{ alert.product_icon|default:'bi-app' }} text-muted"></i>
                        <span class="badge bg-{{ alert.severity|severity_class }} badge-sm">{{ alert.severity }}</span>
                    </div>
                    <small>{{ alert.title }}</small>
                </div>
            </div>
            {% if alert.since %}
            <div class="text-muted" style="font-size: .7rem;">Since {{ alert.since|truncatechars:10 }}</div>
            {% endif %}
        </a>
        {% endfor %}
    </div>
    {% else %}
    <div class="card-body text-center text-muted py-4">
        <i class="bi bi-shield-check fs-3 d-block mb-2"></i>
        No active alerts.
    </div>
    {% endif %}
</div>
